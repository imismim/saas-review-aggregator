build:
  docker:
    web: Dockerfile
    worker: Dockerfile
    scraper: Dockerfile
run:
  web: gunicorn --chdir src reviewaggregator.wsgi:application --bind 0.0.0.0:$PORT
  worker: celery -A reviewaggregator worker --loglevel=info
  scraper: celery --workdir src -A reviewaggregator worker -Q scraping --loglevel=info
