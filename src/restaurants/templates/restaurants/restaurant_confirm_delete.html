{% extends "base.html" %}

{% block content %}
<div class="container py-4">

    <a href="{% url 'restaurant-detail' restaurant.slug %}" class="btn btn-outline-secondary btn-sm mb-4">
        <i class="bi bi-arrow-left me-1"></i>Back to {{ restaurant.name }}
    </a>

    <div class="card shadow-sm border-danger" style="max-width: 520px;">
        <div class="card-body p-4">
            <h4 class="mb-1 text-danger">
                <i class="bi bi-trash me-2"></i>Delete Restaurant
            </h4>
            <p class="text-muted mb-3">This action cannot be undone.</p>

            <p class="mb-4">
                Are you sure you want to delete <strong>{{ restaurant.name }}</strong>?
                All associated reviews will also be removed.
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash me-2"></i>Yes, Delete
                    </button>
                    <a href="{% url 'restaurant-detail' restaurant.slug %}" class="btn btn-outline-secondary px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock content %}
