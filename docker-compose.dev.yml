services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-1
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"  
      - "15672:15672" 
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
  worker-default:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: worker-default
    command: celery --workdir src -A reviewaggregator worker  --loglevel=info -Q default --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq
    environment:
      - CELERY_BROKER_URL=${RABBITMQ_URL}
      - PYTHONPATH=/app/src

  worker-scraping:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: worker-scraping
    command: celery --workdir src -A reviewaggregator worker  --loglevel=info -Q scraping --concurrency=2
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq
    environment:
      - CELERY_BROKER_URL=${RABBITMQ_URL}
      - PYTHONPATH=/app/src
      
  web:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    container_name: web-1
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    volumes:
      - ./src:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${RABBITMQ_URL}

volumes:
  media_volume:
  static_volume:
  rabbitmq_data: